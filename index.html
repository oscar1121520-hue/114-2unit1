<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語三模強化挑戰賽 v6.0</title>
    <style>
        :root { --primary: #6c5ce7; --success: #00b894; --danger: #ff7675; --dark: #2d3436; --light: #f8f9fa; --extra: #e67e22; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #eef2f7; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #app { background: white; width: 100%; max-width: 900px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; margin-top: 20px; }
        .hidden { display: none; }
        
        select, .custom-name-input { width: 100%; padding: 12px; font-size: 1.1rem; border-radius: 10px; border: 2px solid var(--primary); margin: 10px 0; outline: none; box-sizing: border-box; }
        .mode-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .btn-mode { padding: 20px 10px; border: 2px solid #ddd; border-radius: 15px; cursor: pointer; transition: 0.3s; background: white; }
        .btn-mode:hover { border-color: var(--primary); background: #f3f0ff; transform: translateY(-3px); }

        .rank-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .rank-card { background: var(--light); padding: 10px; border-radius: 12px; border: 1px solid #dee2e6; min-height: 180px; }
        .rank-card b { display: block; margin-bottom: 8px; color: var(--dark); border-bottom: 2px solid #ddd; padding-bottom: 5px; font-size: 0.85rem; }
        .rank-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; margin: 4px 0; padding: 2px 0; font-size: 0.8rem; }

        .timer { font-size: 2.8rem; color: var(--danger); font-weight: bold; margin-bottom: 10px; font-variant-numeric: tabular-nums; }
        #quiz-box { background: #f1f3f5; padding: 30px 20px; border-radius: 15px; font-size: 1.8rem; margin-bottom: 20px; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .opt-btn { padding: 18px 12px; background: white; border: 2px solid #ddd; border-radius: 12px; cursor: pointer; font-size: 1.1rem; transition: 0.1s; outline: none; }
        .opt-success { background: var(--success) !important; color: white !important; }
        .opt-danger { background: var(--danger) !important; color: white !important; }

        .shake { animation: shake 0.4s; border-color: var(--danger) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-8px); } }
        
        #upload-status { font-size: 0.9rem; color: #888; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

<div id="app">
    <div id="start-screen">
        <h1 style="color: var(--primary);">🎓 英語三模強化挑戰賽</h1>
        <div id="loading-msg">⏳ 正在載入雲端紀錄...</div>
        
        <div id="main-ui" class="hidden">
            <select id="user-select" onchange="toggleCustomName()">
                <option value="">-- 請選擇姓名 --</option>
                <option value="Oscar">Oscar</option><option value="Alex">Alex</option><option value="Eve">Eve</option>
                <option value="Xavier">Xavier</option><option value="Tim">Tim</option><option value="Chloe">Chloe</option>
                <option value="劉開晨">劉開晨</option><option value="其他">其他</option>
            </select>
            <input type="text" id="custom-name" class="custom-name-input hidden" placeholder="請在此輸入姓名">

            <div class="mode-container">
                <div class="btn-mode" onclick="startGame('模式A')"><h3>模式 A</h3><p>看中拼英</p></div>
                <div class="btn-mode" onclick="startGame('模式B')"><h3>模式 B</h3><p>聽英選中</p></div>
                <div class="btn-mode" style="border-color:var(--extra)" onclick="startGame('模式C')"><h3>模式 C</h3><p>課外單字</p></div>
            </div>

            <div class="rank-grid">
                <div class="rank-card"><b>🏆 模式 A (最佳)</b><div id="rankA"></div></div>
                <div class="rank-card"><b>🏆 模式 B (最佳)</b><div id="rankB"></div></div>
                <div class="rank-card"><b>🏆 模式 C (最佳)</b><div id="rankC"></div></div>
                <div class="rank-card" style="background: #efebff;"><b>🔥 總分榜</b><div id="rankTotal"></div></div>
            </div>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div class="timer" id="timer-display">---</div>
        <div id="score-info" style="font-weight: bold; margin-bottom: 10px;"></div>
        <div id="quiz-box"></div>
        <div id="input-area">
            <input type="text" id="ans-input" class="hidden" placeholder="輸入完按 Enter">
            <div id="options-area" class="options-grid hidden"></div>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>🎉 挑戰完成！</h2>
        <div id="result-stats" style="font-size: 1.4rem; margin: 20px 0;"></div>
        <div id="upload-status">⏳ 成績同步中，請稍候...</div>
        <button id="back-btn" onclick="location.reload()" disabled style="padding:15px 50px; border-radius:10px; cursor:not-allowed; background:#ccc; color:white; border:none; font-size:1.1rem; margin-top:10px;">請稍候</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyCBu8VfIfcUeHG7F08J6H552J3Im2vvAH8wT89CxjvT15xOZNVxd-8fY5dwtTx2bofoA/exec";
    let wordBank = [], currentPlayer = "", currentMode = "", score = 0, timeLeft = 0, currentIdx = 0, gameTimer = null, isProcessing = false;

    window.onload = async () => {
        try {
            const res = await fetch(API_URL + `?t=${Date.now()}`);
            const data = await res.json();
            ['rankA', 'rankB', 'rankC', 'rankTotal'].forEach(id => renderTable(id, data[id]));
            document.getElementById('loading-msg').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
        } catch (e) { document.getElementById('loading-msg').innerText = "❌ 讀取失敗，請重新整理頁面。"; }
    };

    function toggleCustomName() {
        const customInput = document.getElementById('custom-name');
        customInput.classList.toggle('hidden', document.getElementById('user-select').value !== '其他');
    }

    function renderTable(id, data) {
        const container = document.getElementById(id);
        if(!data || data.length === 0) { container.innerHTML = "<div style='color:#999'>無</div>"; return; }
        container.innerHTML = data.map((r, i) => `<div class="rank-item"><span>${i+1}. ${r.name}</span><b>${r.score}</b></div>`).join('');
    }

    async function startGame(mode) {
        const select = document.getElementById('user-select');
        const customInput = document.getElementById('custom-name');
        let name = select.value === '其他' ? customInput.value.trim() : select.value;
        if (!name) return alert("請輸入姓名！");

        if (gameTimer) clearInterval(gameTimer);
        
        currentPlayer = name; currentMode = mode; score = 0; currentIdx = 0; isProcessing = false;
        timeLeft = (mode === '模式C') ? 300 : 360;

        document.getElementById('main-ui').classList.add('hidden');
        document.getElementById('loading-msg').classList.remove('hidden');
        document.getElementById('loading-msg').innerText = "⏳ 題庫準備中...";

        try {
            const action = (mode === '模式C') ? 'getExtraWords' : 'getWords';
            const res = await fetch(`${API_URL}?action=${action}`);
            wordBank = await res.json();
            wordBank.sort(() => Math.random() - 0.5);

            document.getElementById('loading-msg').classList.add('hidden');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            document.getElementById('timer-display').innerText = timeLeft;
            nextQuiz();

            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-display').innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        } catch (e) { alert("連線失敗！"); location.reload(); }
    }

    function nextQuiz() {
        if(currentIdx >= wordBank.length || timeLeft <= 0) return endGame();
        const quizBox = document.getElementById('quiz-box'), ansInput = document.getElementById('ans-input'), optionsArea = document.getElementById('options-area');
        const q = wordBank[currentIdx];
        
        document.getElementById('score-info').innerText = `積分：${score}`;
        quizBox.className = ""; ansInput.className = "hidden"; optionsArea.className = "options-grid hidden";
        isProcessing = false;

        if (currentMode === '模式A') {
            quizBox.innerHTML = `<div>${q.zh}</div>`;
            ansInput.classList.remove('hidden'); ansInput.value = ""; ansInput.focus();
        } else {
            quizBox.innerHTML = (currentMode === '模式C' ? `<div style="font-size:2.5rem;color:var(--extra)">${q.en}</div>` : '') + `<button onclick="speak('${q.en.replace(/'/g, "\\'")}')" style="background:none;border:none;font-size:3rem;cursor:pointer">🔊</button>`;
            optionsArea.classList.remove('hidden'); generateOptions(q.zh);
        }
        speak(q.en);
    }

    function generateOptions(correctZh) {
        const area = document.getElementById('options-area'); area.innerHTML = "";
        let choices = wordBank.filter(w => w.zh !== correctZh).map(w => w.zh).sort(() => Math.random() - 0.5).slice(0, 3);
        choices.push(correctZh);
        choices.sort(() => Math.random() - 0.5).forEach(c => {
            const btn = document.createElement('button'); btn.className = "opt-btn"; btn.innerText = c;
            btn.onclick = (e) => checkAnswer(c, e.target); area.appendChild(btn);
        });
    }

    function speak(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m); }

    async function checkAnswer(val, btn = null) {
        if (isProcessing || timeLeft <= 0) return;
        isProcessing = true; 
        const q = wordBank[currentIdx];
        const isCorrect = (currentMode === '模式A' ? q.en.toLowerCase() === val.trim().toLowerCase() : q.zh === val);

        if (isCorrect) {
            score += 10;
            if (btn) btn.classList.add('opt-success');
            await new Promise(r => setTimeout(r, 150));
        } else {
            score -= 5;
            if (btn) btn.classList.add('opt-danger');
            document.getElementById('quiz-box').classList.add('shake');
            await new Promise(r => setTimeout(r, 450));
        }
        currentIdx++; nextQuiz();
    }

    async function endGame() {
        if (gameTimer) { clearInterval(gameTimer); gameTimer = null; }
        if (document.getElementById('game-screen').classList.contains('hidden')) return;

        const bonus = Math.max(0, timeLeft);
        const total = score + bonus;
        
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('result-stats').innerHTML = `得分：${score} | 紅利：${bonus}<br><b>總積分：${total}</b>`;
        
        // 核心上傳機制：改回 POST 並等待確認
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ name: currentPlayer, score: total, mode: currentMode })
            });
            document.getElementById('upload-status').innerText = "✅ 成績已成功存入排行榜！";
        } catch (e) {
            document.getElementById('upload-status').innerText = "⚠️ 自動同步失敗，但已記錄於後端。";
        } finally {
            const backBtn = document.getElementById('back-btn');
            backBtn.disabled = false;
            backBtn.innerText = "返回排行榜";
            backBtn.style.background = "var(--primary)";
            backBtn.style.cursor = "pointer";
        }
    }

    document.getElementById('ans-input').addEventListener('keypress', e => { if(e.key === 'Enter') checkAnswer(e.target.value); });
</script>
</body>
</html>
